<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | LockItPDF</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="site-header">
    <a class="brand" href="login.html" aria-label="LockItPDF home">
        <span class="brand-mark">L</span>
        <span>LockItPDF</span>
    </a>
    <button class="menu-button" type="button" data-menu-toggle aria-label="Toggle navigation">&#9776;</button>
    <nav class="nav" data-nav>
        <a href="login.html" class="active">Login</a>
        <a href="signup.html">Signup</a>
        <a href="support.html">Support</a>
    </nav>
</header>
<main class="page">
    <section class="auth-shell modern-auth">
        <form id="login-form" class="modern-card modern-form auth-card">
            <p class="app-kicker">Welcome back</p>
            <h1>Login</h1>
            <div class="alert" data-auth-error hidden></div>
            <label class="field"><span>Username or Email</span><input name="username" required autocomplete="username"></label>
            <label class="field"><span>Password</span><input type="password" name="password" required autocomplete="current-password"></label>
            <button class="modern-button" type="submit"><span class="material-symbols-rounded" aria-hidden="true">lock</span>Login</button>
            <p class="helper-text">New here? <a href="signup.html">Create an account</a></p>
        </form>
    </section>
</main>
<footer class="footer">
    <p>LockItPDF does not store your files or passwords. Recovery option is for local/private use only.</p>
</footer>
<script src="assets/app.js"></script>
<script src="assets/js/api-client.js"></script>
<script src="assets/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('#login-form');
    const errorBox = document.querySelector('[data-auth-error]');
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || 'index.html';

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorBox.hidden = true;
        errorBox.textContent = '';

        try {
            await window.LockItPDFAuth.login(form.elements.username.value, form.elements.password.value);
            window.location.href = next;
        } catch (error) {
            errorBox.textContent = error.message || 'Login failed.';
            errorBox.hidden = false;
        }
    });
});
</script>
</body>
</html>
