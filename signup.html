<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signup | LockItPDF</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="site-header">
    <a class="brand" href="index.html" aria-label="LockItPDF home">
        <span class="brand-mark">L</span>
        <span>LockItPDF</span>
    </a>
    <button class="menu-button" type="button" data-menu-toggle aria-label="Toggle navigation">&#9776;</button>
    <nav class="nav" data-nav>
        <a href="index.html">Home</a>
        <a href="signup.html" class="active">Signup</a>
        <a href="support.html">Support</a>
    </nav>
</header>
<main class="page">
    <section class="auth-shell modern-auth">
        <form id="signup-form" class="modern-card modern-form auth-card">
            <p class="app-kicker">Start secure</p>
            <h1>Create Account</h1>
            <div class="alert" data-auth-error hidden></div>
            <label class="field"><span>Username</span><input name="username" required autocomplete="username"></label>
            <label class="field"><span>Email</span><input type="email" name="email" required autocomplete="email"></label>
            <label class="field"><span>Password</span><input type="password" name="password" required minlength="8" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&amp;*(),.?&quot;:{}|&lt;&gt;]).{8,}" title="Use at least 8 characters with uppercase, lowercase, number, and symbol." data-password autocomplete="new-password"></label>
            <meter class="strength modern-strength" min="0" max="5" low="3" high="4" optimum="5" value="0" data-strength></meter>
            <p class="helper-text">Use uppercase, lowercase, number, symbol, and at least 8 characters.</p>
            <button class="modern-button" type="submit"><span class="material-symbols-rounded" aria-hidden="true">add</span>Sign Up</button>
            <p class="helper-text">Already registered? <a href="index.html">Home</a></p>
        </form>
    </section>
</main>
<footer class="footer">
    <p>LockItPDF does not store your files or passwords. Recovery option is for local/private use only.</p>
</footer>
<script src="assets/app.js"></script>
<script src="assets/js/api-client.js"></script>
<script src="assets/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('#signup-form');
    const errorBox = document.querySelector('[data-auth-error]');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorBox.hidden = true;
        errorBox.textContent = '';

        try {
            await window.LockItPDFAuth.signup({
                username: form.elements.username.value,
                email: form.elements.email.value,
                password: form.elements.password.value
            });
            window.location.href = 'index.html';
        } catch (error) {
            errorBox.textContent = error.message || 'Signup failed.';
            errorBox.hidden = false;
        }
    });
});
</script>
</body>
</html>
